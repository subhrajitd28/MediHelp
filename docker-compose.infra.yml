version: '3.8'

# Infrastructure only - run this for local development
# Usage: docker compose -f docker-compose.infra.yml up -d

services:
  # ---- PostgreSQL Databases (one per service) ----
  postgres-auth:
    image: postgres:16-alpine
    container_name: medihelp-postgres-auth
    environment:
      POSTGRES_DB: medihelp_auth
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d medihelp_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16-alpine
    container_name: medihelp-postgres-user
    environment:
      POSTGRES_DB: medihelp_user
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5434:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d medihelp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-health:
    image: postgres:16-alpine
    container_name: medihelp-postgres-health
    environment:
      POSTGRES_DB: medihelp_health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5435:5432"
    volumes:
      - postgres-health-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d medihelp_health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-prescription:
    image: postgres:16-alpine
    container_name: medihelp-postgres-prescription
    environment:
      POSTGRES_DB: medihelp_prescription
      POSTGRES_USER: prescription_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5436:5432"
    volumes:
      - postgres-prescription-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prescription_user -d medihelp_prescription"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    container_name: medihelp-postgres-notification
    environment:
      POSTGRES_DB: medihelp_notification
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5437:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d medihelp_notification"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MongoDB ----
  mongodb:
    image: mongo:7
    container_name: medihelp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: medihelp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- RabbitMQ ----
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medihelp-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI at http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-health-data:
  postgres-prescription-data:
  postgres-notification-data:
  mongodb-data:
  redis-data:
  rabbitmq-data:
