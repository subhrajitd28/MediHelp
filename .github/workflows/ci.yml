name: MediHelp CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Java Microservices ----
  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test all Java modules
        run: mvn clean verify -B

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'

  # ---- Python AI Service ----
  build-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medihelp-ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: medihelp-ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v || echo "No tests yet"

  # ---- Angular Frontend ----
  build-angular:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medihelp-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: medihelp-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production

  # ---- Docker Build Verification ----
  docker-build:
    runs-on: ubuntu-latest
    needs: [build-java, build-python, build-angular]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Java JARs
        run: mvn clean package -DskipTests -B

      - name: Build Docker images
        run: |
          docker build -t medihelp-eureka ./medihelp-eureka
          docker build -t medihelp-gateway ./medihelp-gateway
          docker build -t medihelp-auth-service ./medihelp-auth-service
          docker build -t medihelp-user-service ./medihelp-user-service
          docker build -t medihelp-health-service ./medihelp-health-service
          docker build -t medihelp-prescription-service ./medihelp-prescription-service
          docker build -t medihelp-notification-service ./medihelp-notification-service
          docker build -t medihelp-ai-service ./medihelp-ai-service
          docker build -t medihelp-frontend ./medihelp-frontend
