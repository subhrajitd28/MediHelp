name: Deploy to Cloud VM

on:
  workflow_dispatch:  # Manual trigger only

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/medihelp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: medihelp-frontend/package-lock.json

      - name: Build Java JARs
        run: mvn clean package -DskipTests -B

      - name: Build Angular
        working-directory: medihelp-frontend
        run: npm ci && npx ng build --configuration production

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          services="eureka gateway auth-service user-service health-service prescription-service notification-service ai-service frontend"
          for svc in $services; do
            docker build -t ${{ env.IMAGE_PREFIX }}-$svc:latest ./medihelp-$svc
            docker push ${{ env.IMAGE_PREFIX }}-$svc:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/medihelp
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull latest images
            docker compose pull
            # Restart with zero downtime
            docker compose up -d --remove-orphans
            # Cleanup old images
            docker system prune -f
            # Show running containers
            docker ps --format "table {{.Names}}\t{{.Status}}"
